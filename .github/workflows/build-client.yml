name: Build Windows Client

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/build-client.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to create/update releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: client/requirements.txt

      - name: Install dependencies
        working-directory: client
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        working-directory: client
        run: pyinstaller FragReel.spec --noconfirm

      - name: Verify executable
        working-directory: client
        run: |
          if (Test-Path "dist\FragReel.exe") {
            $size = (Get-Item "dist\FragReel.exe").length / 1MB
            Write-Host "✅ FragReel.exe built — $([math]::Round($size, 1)) MB"
          } else {
            Write-Error "❌ FragReel.exe not found"
            exit 1
          }

      - name: Upload to GitHub Release (rolling "latest-build")
        uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          name: "FragReel Client · Latest Build"
          body: |
            **Build automático** do commit `${{ github.sha }}` em ${{ github.event.head_commit.message }}

            ### Instalação
            1. Baixe o `FragReel.exe`
            2. Execute — ele detecta o Steam e o CS2 automaticamente
            3. Jogue uma partida; a demo aparece no dashboard em minutos

            > Requer Windows 10/11 com Steam e CS2 instalados.
          artifacts: "client/dist/FragReel.exe"
          artifactContentType: "application/octet-stream"
          allowUpdates: true
          makeLatest: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
